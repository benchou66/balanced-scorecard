<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平衡計分卡系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: #1a1f2e;
  color: #e2e8f0;
  min-height: 100vh;
  padding: 20px 24px;
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.toolbar-left  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-left: auto; }
.toolbar-title { font-size: .78rem; color: #8899aa; }

/* ── Buttons ── */
.btn {
  padding: 7px 14px;
  border: none; border-radius: 7px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: .82rem; font-weight: 500;
  transition: all .15s;
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-amber   { background: #f59e0b; color: #fff; }
.btn-amber:hover { background: #d97706; }
.btn-ghost   { background: rgba(255,255,255,.08); color: #ccd; border: 1px solid rgba(255,255,255,.12); }
.btn-ghost:hover { background: rgba(255,255,255,.14); }
.btn-danger  { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-cancel  { background: rgba(255,255,255,.06); color: #aab; border: 1px solid rgba(255,255,255,.1); }
.btn-cancel:hover { background: rgba(255,255,255,.1); }
/* icon-only on small screens */
.btn-icon-label { display: inline; }

/* ── Filter Pills ── */
.pill {
  padding: 4px 12px; border-radius: 99px;
  font-size: .75rem; font-weight: 600;
  cursor: pointer; border: none; color: #fff;
  opacity: .6; transition: opacity .15s;
  white-space: nowrap;
}
.pill:hover, .pill.active { opacity: 1; }

/* ── Card ── */
.card {
  background: #232b3e;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.45);
}
.card-header {
  background: #1e2536;
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.07);
  flex-wrap: wrap; gap: 8px;
}
.card-title { font-size: 1rem; font-weight: 700; }
.card-hint  { font-size: .75rem; color: #8899aa; }

/* ── Desktop Table ── */
.table-wrap { overflow: auto; -webkit-overflow-scrolling: touch; max-height: calc(100vh - 160px); }
.sc-table { width: 100%; border-collapse: collapse; font-size: .86rem; }
.sc-table thead tr.row-staff th {
  background: #2a3349; color: #c8d4e8;
  font-weight: 500; font-size: .8rem;
  padding: 13px 10px 10px;
  text-align: center;
  border-bottom: 2px solid rgba(255,255,255,.08);
  white-space: nowrap; position: sticky; top: 0; z-index: 4;
}
.sc-table thead tr.row-staff th.th-goal {
  text-align: left; padding-left: 18px;
  width: 320px; min-width: 320px; font-size: .76rem; color: #8899aa; font-weight: 400;
  position: sticky; left: 0; top: 0; z-index: 5; background: #2a3349;
}
.sc-table thead tr.row-staff th.th-count {
  min-width: 100px; color: #8899aa; font-weight: 400; font-size: .76rem;
}
.staff-name {
  display: block; font-weight: 600; font-size: .86rem; color: #e2e8f0;
  border-bottom: 1px dashed transparent; transition: border .15s;
  outline: none; cursor: pointer;
}
.staff-name:hover, .staff-name:focus { border-bottom-color: #3b82f6; }
.staff-role {
  display: block; font-size: .7rem; color: #8899aa; margin-top: 2px;
  outline: none; border-bottom: 1px dashed transparent; transition: border .15s; cursor: pointer;
}
.staff-role:hover, .staff-role:focus { border-bottom-color: #8899aa; }
.del-staff-btn {
  position: absolute; top: 4px; right: 4px;
  background: none; border: none; color: #556;
  font-size: .68rem; cursor: pointer; padding: 2px 4px; border-radius: 4px;
}
.del-staff-btn:hover { color: #ef4444; background: rgba(239,68,68,.1); }

.sc-table tbody tr.row-data td {
  padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,.05);
  text-align: center; vertical-align: middle;
}
.sc-table tbody tr.row-data:last-child td { border-bottom: none; }
.sc-table tbody tr.row-data:hover td { background: rgba(255,255,255,.03); }
.sc-table tbody tr.row-data td.td-goal { text-align: left; padding-left: 18px; width: 320px; min-width: 320px; position: sticky; left: 0; z-index: 2; background: #232b3e; }
.sc-table tbody tr.row-data:hover td.td-goal { background: #263040; }
.sc-table tfoot tr.row-footer td.td-goal-label { position: sticky; left: 0; z-index: 2; background: #1e2536; }

.goal-wrap { display: flex; align-items: flex-start; gap: 7px; width: 100%; }
.persp-badge {
  font-size: .65rem; font-weight: 700;
  padding: 2px 7px; border-radius: 99px; color: #fff;
  white-space: nowrap; flex-shrink: 0;
}
.goal-name {
  outline: none; border-bottom: 1px dashed transparent;
  transition: border .15s; cursor: pointer;
  font-size: .88rem; color: #dde6f4; line-height: 1.6;
  flex: 1; min-width: 0; white-space: normal; word-break: break-word;
}
.goal-name:hover, .goal-name:focus { border-bottom-color: #3b82f6; }
.del-goal-btn {
  background: none; border: none; color: #445;
  font-size: .72rem; cursor: pointer; padding: 2px 5px;
  border-radius: 4px; flex-shrink: 0; margin-left: auto;
  opacity: 0; transition: opacity .15s, color .15s;
}
tr.row-data:hover .del-goal-btn { opacity: 1; }
.del-goal-btn:hover { color: #ef4444; }

/* Rank chart */
.rank-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.rank-medal { font-size:1.1rem; width:28px; text-align:center; flex-shrink:0; }
.rank-name { width:80px; font-size:.85rem; color:#e2e8f0; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rank-role { width:130px; font-size:.72rem; color:#8899aa; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rank-bar-wrap { flex:1; display:flex; align-items:center; gap:8px; }
.rank-bar-bg { flex:1; height:18px; background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden; }
.rank-bar-fill { height:100%; border-radius:99px; transition:width .6s cubic-bezier(.4,0,.2,1); }
.rank-count { font-size:.82rem; font-weight:700; color:#e2e8f0; min-width:36px; text-align:right; white-space:nowrap; }
.note-popup {
  position: fixed; z-index: 1000;
  background: #2a3349; border: 1px solid rgba(255,255,255,.15);
  border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  width: 260px; animation: mIn .15s ease;
}
.note-popup-title { font-size: .78rem; color: #8899aa; margin-bottom: 8px; }
.note-popup textarea {
  width: 100%; height: 80px; background: #1e2536;
  border: 1.5px solid rgba(255,255,255,.1); border-radius: 8px;
  color: #e2e8f0; font-family: 'Noto Sans TC', sans-serif;
  font-size: .85rem; padding: 8px 10px; resize: none;
  outline: none; line-height: 1.5;
}
.note-popup textarea:focus { border-color: #3b82f6; }
.note-popup-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.note-indicator { 
  font-size: .65rem; color: #f59e0b; 
  position: absolute; top: 2px; right: 2px;
  line-height: 1;
}
.check-cell { cursor: pointer; user-select: none; vertical-align: middle; min-width: 80px; }
.check-cell-inner { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 2px; }
.check-note-text { font-size: .65rem; color: #f59e0b; text-align: center; max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
.check-box {
  width: 26px; height: 26px; border-radius: 6px;
  border: 2px solid rgba(255,255,255,.15);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all .15s; margin: auto;
}
.check-box.checked { background: #22c55e; border-color: #22c55e; width: 9px; height: 9px; border-radius: 2px; border-width: 1px; }
.check-box svg { width: 5px; height: 5px; stroke: #fff; stroke-width: 4; }

/* Count column */
.count-wrap { display: flex; align-items: center; gap: 7px; padding: 0 6px; }
.count-bar-bg { flex: 1; height: 5px; background: rgba(255,255,255,.1); border-radius: 99px; overflow: hidden; min-width: 30px; }
.count-bar-fill { height: 100%; background: #22c55e; border-radius: 99px; transition: width .4s; }
.count-text { font-size: .8rem; color: #8899aa; white-space: nowrap; min-width: 26px; text-align: right; }

/* Footer row */
.sc-table tfoot tr.row-footer td {
  background: #1e2536; padding: 9px 10px;
  text-align: center; font-size: .8rem; color: #8899aa;
  border-top: 1px solid rgba(255,255,255,.08);
}
.sc-table tfoot tr.row-footer td.td-goal-label {
  text-align: left; padding-left: 18px; font-size: .76rem;
}
.foot-count { font-weight: 700; font-size: .9rem; }
.foot-total { font-weight: 400; color: #556; font-size: .73rem; }

/* Summary bar */
.summary-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 18px; background: #1a2030;
  border-top: 1px solid rgba(255,255,255,.06);
  font-size: .76rem; color: #6677aa;
  flex-wrap: wrap; gap: 8px;
}
.staff-scores { display: flex; gap: 12px; flex-wrap: wrap; }
.staff-score-item { color: #8899cc; }
.staff-score-item strong { color: #aabbdd; }

/* ── Mobile Card View ── */
.mobile-view { display: none; }
.mobile-persp-section { margin-bottom: 18px; }
.mobile-persp-title {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; background: #1e2536;
  font-size: .8rem; font-weight: 700; color: #8899cc;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.mobile-goal-card {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.mobile-goal-card:last-child { border-bottom: none; }
.mobile-goal-header {
  display: flex; align-items: flex-start; gap: 8px;
  margin-bottom: 10px;
}
.mobile-goal-name {
  font-size: .88rem; color: #dde6f4; line-height: 1.4; flex: 1;
  outline: none; border-bottom: 1px dashed transparent; transition: border .15s;
}
.mobile-goal-name:focus { border-bottom-color: #3b82f6; }
.mobile-del-btn {
  background: none; border: none; color: #445;
  font-size: .75rem; cursor: pointer; padding: 3px 6px;
  border-radius: 4px; flex-shrink: 0;
}
.mobile-del-btn:hover { color: #ef4444; }
.mobile-staff-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
}
.mobile-staff-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; background: rgba(255,255,255,.04);
  border-radius: 8px; cursor: pointer;
  transition: background .15s; user-select: none;
}
.mobile-staff-item:hover { background: rgba(255,255,255,.08); }
.mobile-staff-item.checked-item { background: rgba(34,197,94,.12); }
.mobile-check-box {
  width: 22px; height: 22px; border-radius: 5px;
  border: 2px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.mobile-check-box.checked { background: #22c55e; border-color: #22c55e; }
.mobile-check-box svg { width: 11px; height: 11px; stroke: #fff; }
.mobile-staff-label { font-size: .8rem; color: #c8d4e8; line-height: 1.2; }
.mobile-staff-label small { display: block; font-size: .68rem; color: #8899aa; }

/* ── Modals ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); z-index: 999;
  align-items: center; justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #2a3349; border-radius: 16px;
  padding: 26px; width: 500px; max-width: 100%;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
  border: 1px solid rgba(255,255,255,.08);
  animation: mIn .2s ease;
}
@keyframes mIn { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
.modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 15px; }
.form-label { font-size: .8rem; font-weight: 600; color: #8899aa; margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; padding: 10px 12px;
  background: #1e2536; border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 9px; color: #e2e8f0;
  font-family: 'Noto Sans TC', sans-serif; font-size: .9rem;
  transition: border .15s; appearance: none;
}
.form-input:focus, .form-select:focus { outline: none; border-color: #3b82f6; }
.form-input::placeholder { color: #445; }
.select-wrap { position: relative; }
.select-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); pointer-events:none; color:#8899aa; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
.chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 99px; font-size: .76rem; font-weight: 600; color: #fff; }
.chip-del { font-size: .62rem; background: rgba(0,0,0,.2); border-radius: 50%; width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.chip-del:hover { background: rgba(0,0,0,.45); }
.staff-edit-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
.empty-msg td { text-align:center; color:#445; font-style:italic; padding:24px; }
.c0{background:#3b82f6} .c1{background:#22c55e} .c2{background:#f59e0b} .c3{background:#a855f7} .c4{background:#ef4444} .c5{background:#14b8a6}

/* ── Responsive Breakpoints ── */

/* Large tablet / small desktop */
@media (max-width: 1200px) {
  .sc-table thead tr.row-staff th { padding: 11px 7px 8px; font-size: .75rem; }
  .sc-table tbody tr.row-data td { padding: 9px 7px; }
  .sc-table thead tr.row-staff th.th-goal { min-width: 500px; }
  .check-box { width: 26px; height: 26px; }
}

/* Tablet: hide button labels, compact table */
@media (max-width: 900px) {
  body { padding: 12px 14px; }
  .btn-icon-label { display: none; }
  .btn { padding: 7px 10px; font-size: .8rem; }
  .toolbar-right { width: 100%; }
  .sc-table { font-size: .78rem; }
  .sc-table thead tr.row-staff th { padding: 10px 5px 7px; font-size: .7rem; }
  .sc-table tbody tr.row-data td { padding: 8px 5px; }
  .sc-table thead tr.row-staff th.th-goal { min-width: 420px; padding-left: 12px; }
  .sc-table tbody tr.row-data td.td-goal { padding-left: 12px; }
  .persp-badge { font-size: .6rem; padding: 1px 5px; }
  .goal-name { font-size: .8rem; }
  .check-box { width: 26px; height: 26px; border-radius: 6px; }
  .check-box svg { width: 11px; height: 11px; }
  .count-wrap { gap: 4px; padding: 0 3px; }
  .count-text { font-size: .72rem; min-width: 22px; }
  .count-bar-bg { min-width: 20px; }
  .pill { padding: 3px 8px; font-size: .7rem; }
  .staff-name { font-size: .78rem; }
  .staff-role { font-size: .65rem; }
}

/* Mobile: switch to card layout */
@media (max-width: 640px) {
  body { padding: 8px 10px; }
  .toolbar { gap: 5px; }
  .toolbar-left { flex-wrap: wrap; width: 100%; }
  .toolbar-right { margin-left: 0; width: 100%; justify-content: flex-start; }
  .pill { padding: 3px 9px; font-size: .7rem; }
  .table-wrap { display: none; }
  .mobile-view { display: block; }
  .card-hint { display: none; }
  .card-header { padding: 12px 14px; }
  .card-title { font-size: .92rem; }
  .summary-bar { font-size: .7rem; padding: 9px 12px; flex-direction: column; align-items: flex-start; }
  .staff-scores { gap: 6px; }
  .staff-score-item { font-size: .7rem; }
  .modal { padding: 18px 14px; max-height: 85vh; }
  .modal-title { font-size: .95rem; margin-bottom: 16px; }
  .staff-edit-item { flex-wrap: wrap; gap: 6px; }
  .staff-edit-item input { min-width: 0; flex: 1 1 100px; padding: 6px 8px; }
  .mobile-staff-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
  .mobile-staff-item { padding: 6px 8px; gap: 6px; }
  .mobile-staff-label { font-size: .72rem; }
  .mobile-staff-label small { font-size: .62rem; }
  .mobile-check-box { width: 20px; height: 20px; flex-shrink: 0; }
  .mobile-goal-card { padding: 11px 13px; }
  .mobile-goal-name { font-size: .82rem; }
  .mobile-persp-title { padding: 8px 13px; font-size: .75rem; }
  .persp-badge { font-size: .62rem; }
}

/* Very small phones */
@media (max-width: 380px) {
  body { padding: 6px 8px; }
  .btn { padding: 6px 8px; font-size: .75rem; }
  .mobile-staff-grid { grid-template-columns: repeat(2, 1fr); }
  .pill { padding: 3px 7px; font-size: .68rem; }
}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-left">
    <button class="btn btn-ghost" onclick="openStaffModal()">👤 <span class="btn-icon-label">管理人員</span></button>
    <button class="btn btn-ghost" onclick="openPerspModal()">🏷️ <span class="btn-icon-label">管理構面</span></button>
    <button class="btn btn-amber" onclick="openGoalModal()">＋ <span class="btn-icon-label">新增目標</span></button>
    <button class="btn btn-ghost" onclick="exportCSV()">📥 <span class="btn-icon-label">匯出 CSV</span></button>
    <button class="btn btn-ghost" onclick="document.getElementById('csv-file-input').click()">📤 <span class="btn-icon-label">匯入 CSV</span></button>
    <input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="importCSV(this)">
    <button class="btn btn-ghost" onclick="openRankModal()" style="background:rgba(168,85,247,.18);border-color:rgba(168,85,247,.4);color:#c084fc;">🏆 <span class="btn-icon-label">工作量排行榜</span></button>
  </div>
  <div class="toolbar-right">
    <span class="toolbar-title">篩選：</span>
    <button class="pill active" style="background:#445;" id="pill-all" onclick="filterPersp('all')">全部</button>
    <span id="persp-pills"></span>
  </div>
</div>

<!-- Card -->
<div class="card">
  <div class="card-header">
    <span class="card-title">目標達成矩陣</span>
    <span class="card-hint">點擊格子打勾即可記錄</span>
  </div>

  <!-- Desktop table -->
  <div class="table-wrap">
    <table class="sc-table" id="sc-table"></table>
  </div>

  <!-- Mobile card view -->
  <div class="mobile-view" id="mobile-view"></div>

  <div class="summary-bar" id="summary-bar"></div>
</div>

<!-- Ranking Modal -->
<div class="modal-overlay" id="modal-rank">
  <div class="modal" style="width:600px;">
    <div class="modal-title">🏆 工作量排行榜</div>
    <div id="rank-chart"></div>
    <div class="modal-footer" style="margin-top:16px;">
      <button class="btn btn-primary" onclick="closeModal('modal-rank')">關閉</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-goal">
  <div class="modal">
    <div class="modal-title">🎯 新增目標</div>
    <div class="form-group">
      <label class="form-label">目標名稱</label>
      <input class="form-input" id="inp-goal-name" placeholder="例如：提升客戶滿意度" onkeydown="if(event.key==='Enter')addGoal()">
    </div>
    <div class="form-group">
      <label class="form-label">構面分類</label>
      <div class="select-wrap"><select class="form-select" id="sel-goal-persp"></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('modal-goal')">取消</button>
      <button class="btn btn-primary" onclick="addGoal()">新增目標</button>
    </div>
  </div>
</div>

<!-- Staff Modal -->
<div class="modal-overlay" id="modal-staff">
  <div class="modal">
    <div class="modal-title">👤 管理中心人員</div>
    <div id="staff-edit-list" style="max-height:240px;overflow-y:auto;margin-bottom:14px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
      <input class="form-input" id="inp-new-staff" placeholder="姓名" style="flex:1;min-width:80px;" onkeydown="if(event.key==='Enter')addStaff()">
      <input class="form-input" id="inp-new-role" placeholder="職稱（選填）" style="flex:1;min-width:80px;">
      <button class="btn btn-primary" onclick="addStaff()">新增</button>

const COLORS=['c0','c1','c2','c3','c4','c5'];
function cc(p){const i=S.perspectives.indexOf(p);return COLORS[i%COLORS.length]||'c0';}
function getChecked(gid,sn){return !!(S.checks[gid]&&S.checks[gid][sn]);}
function getNote(gid,sn){return (S.checks[gid]&&S.checks[gid][sn+'_note'])||'';}

function openNotePopup(gid, sn, cellEl) {
  closeNotePopup();
  // Toggle check
  if(!S.checks[gid]) S.checks[gid]={};
  const wasChecked = !!S.checks[gid][sn];
  S.checks[gid][sn] = !wasChecked;
  const newChecked = S.checks[gid][sn];

  const note = getNote(gid, sn);
  const popup = document.createElement('div');
  popup.className = 'note-popup';
  popup.id = 'note-popup';
  popup.innerHTML = `
    <div class="note-popup-title">📝 ${sn} ・ 備註</div>
    <textarea id="note-textarea" placeholder="輸入備註內容（選填）...">${note}</textarea>
    <div class="note-popup-footer">
      <button class="btn btn-cancel" style="padding:5px 12px;font-size:.78rem;" onclick="cancelNote()">取消</button>
      <button class="btn btn-primary" style="padding:5px 12px;font-size:.78rem;" onclick="saveNote(${gid},'${esc(sn)}')">儲存</button>
    </div>`;

  // Position near cell
  const rect = cellEl.getBoundingClientRect();
  document.body.appendChild(popup);
  const pw = popup.offsetWidth, ph = popup.offsetHeight;
  let top = rect.bottom + 6, left = rect.left;
  if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
  if (top + ph > window.innerHeight - 10) top = rect.top - ph - 6;
  popup.style.top = top + 'px';
  popup.style.left = left + 'px';
  setTimeout(() => document.getElementById('note-textarea')?.focus(), 50);

  // Store pending state
  popup._gid = gid; popup._sn = sn; popup._wasChecked = wasChecked;
  render(); // refresh checkbox state
}

function cancelNote() {
  const popup = document.getElementById('note-popup');
  if (!popup) return;
  const gid = popup._gid, sn = popup._sn, wasChecked = popup._wasChecked;
  if(!S.checks[gid]) S.checks[gid]={};
  S.checks[gid][sn] = wasChecked;
  closeNotePopup();
  render();
}

function saveNote(gid, sn) {
  const txt = document.getElementById('note-textarea')?.value || '';
  if(!S.checks[gid]) S.checks[gid]={};
  S.checks[gid][sn+'_note'] = txt;
  // 有備註文字時強制維持勾選
  if(txt.trim()) S.checks[gid][sn] = true;
  closeNotePopup();
  render();
  saveState();
}

function closeNotePopup() {
  document.getElementById('note-popup')?.remove();
}

// Close popup on outside click - restore check state
document.addEventListener('click', e => {
  const popup = document.getElementById('note-popup');
  if (popup && !popup.contains(e.target) && !e.target.closest('.check-cell')) {
    const gid = popup._gid, sn = popup._sn, wasChecked = popup._wasChecked;
    if(gid !== undefined && sn !== undefined) {
      if(!S.checks[gid]) S.checks[gid]={};
      S.checks[gid][sn] = wasChecked;
      render();
    }
    closeNotePopup();
  }
});

function toggleCheck(gid,sn,cellEl){

}

/* ── Helpers ── */
function esc(s){ return s.replace(/'/g,"\\'"); }

function renameStaff(old,n){
  if(!n||n===old)return;
  const idx=S.staff.findIndex(s=>s.name===old);if(idx<0)return;
  S.staff[idx].name=n;
  S.goals.forEach(g=>{if(S.checks[g.id]&&S.checks[g.id][old]!==undefined){S.checks[g.id][n]=S.checks[g.id][old];delete S.checks[g.id][old];}});
  render();
}
function renameRole(sn,r){const s=S.staff.find(s=>s.name===sn);if(s)s.role=r;}
function delStaff(name){
  if(!confirm(`確定移除 ${name}？`))return;
  S.staff=S.staff.filter(s=>s.name!==name);
  S.goals.forEach(g=>{if(S.checks[g.id])delete S.checks[g.id][name];});

}

let _dragIdx = null;
function dragStart(e, idx) {
  _dragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.style.opacity = '0.4', 0);
}
function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // highlight drop target
  document.querySelectorAll('.staff-edit-item').forEach(el => el.style.borderTop = '');
  const target = e.currentTarget;
  const targetIdx = parseInt(target.dataset.idx);
  if (targetIdx !== _dragIdx) target.style.borderTop = '2px solid #3b82f6';
}
function dragDrop(e, toIdx) {
  e.preventDefault();
  if (_dragIdx === null || _dragIdx === toIdx) return;
  const moved = S.staff.splice(_dragIdx, 1)[0];
  S.staff.splice(toIdx, 0, moved);
  _dragIdx = null;
  renderStaffEdit();
}
function dragEnd(e) {
  e.target.style.opacity = '';
  document.querySelectorAll('.staff-edit-item').forEach(el => el.style.borderTop = '');
  _dragIdx = null;
}
function updateStaffName(idx,n){

  S.goals.forEach(g=>{if(S.checks[g.id]&&S.checks[g.id][old]!==undefined){S.checks[g.id][n]=S.checks[g.id][old];delete S.checks[g.id][old];}});
}
function updateStaffRole(idx,r){S.staff[idx].role=r.trim();}
function removeStaffIdx(idx){

function renamePerspective(idx,n){

function removePerspective(idx){

/* ── CSV Export ── */
function exportCSV(){
  const goals=S.goals;
  const staffNames=S.staff.map(s=>s.name);
  const staffRoles=S.staff.map(s=>s.role||'');
  const rows=[];
  rows.push(['##META']);
  rows.push(['##PERSPECTIVES',...S.perspectives]);
  rows.push(['##STAFF_NAMES',...staffNames]);
  rows.push(['##STAFF_ROLES',...staffRoles]);
  rows.push([]);
  rows.push(['構面','目標',...staffNames]);
  goals.forEach(g=>{
    const checks=staffNames.map(sn=>getChecked(g.id,sn)?'1':'0');
    rows.push([g.perspective,g.name,...checks]);
  });
  const csv=rows.map(r=>r.map(cell=>{
    const s=String(cell??'');
    return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='平衡計分卡.csv';a.click();
  URL.revokeObjectURL(url);
}

/* ── CSV Import ── */
function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let text=e.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      const rows=parseCSV(text);
      if(!rows.length){alert('CSV 檔案是空的');return;}
      let perspectives=[],staffNames=[],staffRoles=[],dataRows=[];
      let inData=false;
      for(const row of rows){
        if(!row.length||(row.length===1&&row[0]===''))continue;
        if(row[0]==='##META')continue;
        if(row[0]==='##PERSPECTIVES'){perspectives=row.slice(1).filter(Boolean);continue;}
        if(row[0]==='##STAFF_NAMES'){staffNames=row.slice(1).filter(Boolean);continue;}
        if(row[0]==='##STAFF_ROLES'){staffRoles=row.slice(1);continue;}
        if(row[0]==='構面'&&row[1]==='目標'){inData=true;continue;}
        if(inData)dataRows.push(row);
      }
      if(!inData&&rows.length>1){
        const header=rows[0];staffNames=header.slice(2);
        staffRoles=staffNames.map(()=>'');dataRows=rows.slice(1);
        perspectives=[...new Set(dataRows.map(r=>r[0]).filter(Boolean))];
      }
      if(!staffNames.length){alert('無法解析人員資料');return;}
      const newStaff=staffNames.map((n,i)=>({name:n,role:staffRoles[i]||''}));
      const newGoals=[],newChecks={};let nextId=1;
      dataRows.forEach(row=>{
        if(!row[1])return;
        const g={id:nextId++,name:row[1],perspective:row[0]||''};
        newGoals.push(g);newChecks[g.id]={};
        staffNames.forEach((sn,i)=>{newChecks[g.id][sn]=row[2+i]==='1';});
      });
      if(!newGoals.length){alert('CSV 中找不到目標資料');return;}
      if(!confirm(`確定匯入？\n・${newStaff.length} 位人員\n・${newGoals.length} 個目標\n\n這將覆蓋目前所有資料。`))return;
      S.perspectives=perspectives.length?perspectives:[...new Set(newGoals.map(g=>g.perspective).filter(Boolean))];
      S.staff=newStaff;S.goals=newGoals;S.checks=newChecks;S.nextId=nextId;S.filter='all';
      render();alert('匯入成功！');
    }catch(err){alert('匯入失敗：'+err.message);}
    input.value='';
  };
  reader.readAsText(file,'utf-8');
}

function parseCSV(text){
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'&&text[i+1]==='"'){cell+='"';i++;}
      else if(c==='"')inQ=false;
      else cell+=c;
    }else{
      if(c==='"')inQ=true;
      else if(c===','){row.push(cell);cell='';}
      else if(c==='\n'||(c==='\r'&&text[i+1]==='\n')){
        if(c==='\r')i++;
        row.push(cell);rows.push(row);row=[];cell='';
      }else cell+=c;
    }
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}

// ── Ranking Chart ──
function openRankModal() {
  const goals = S.goals;
  const totalGoals = goals.length;
  const scores = S.staff.map(s => {
    const checked = goals.filter(g => getChecked(g.id, s.name)).length;
    return { name: s.name, role: s.role || '', checked };
  }).sort((a, b) => b.checked - a.checked);

  const max = scores[0]?.checked || 1;
  const barColors = ['#f59e0b','#94a3b8','#b45309','#3b82f6','#22c55e','#a855f7','#14b8a6','#ef4444'];
  const medals = ['🥇','🥈','🥉'];

  let html = `<div style="margin-bottom:12px;font-size:.78rem;color:#8899aa;">共 ${totalGoals} 個目標・${S.staff.length} 位人員</div>`;
  scores.forEach((s, i) => {
    const pct = max > 0 ? Math.round(s.checked / max * 100) : 0;
    const color = barColors[i % barColors.length];
    const medal = medals[i] !== undefined ? medals[i] : `<span style="font-size:.78rem;color:#556;">${i+1}</span>`;
    html += `
      <div class="rank-item">
        <span class="rank-medal">${medal}</span>
        <span class="rank-name" title="${s.name}">${s.name}</span>
        <span class="rank-role" title="${s.role}">${s.role}</span>
        <div class="rank-bar-wrap">
          <div class="rank-bar-bg">
            <div class="rank-bar-fill" style="width:0%;background:${color}" data-pct="${pct}"></div>
          </div>
          <span class="rank-count">${s.checked}/${totalGoals}</span>
        </div>
      </div>`;
  });

  document.getElementById('rank-chart').innerHTML = html;
  openModal('modal-rank');
  setTimeout(() => {
    document.querySelectorAll('.rank-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 50);
}

const SB_HDR = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };
let _saveTimer = null;

// ── 讀取資料 ──
async function loadFromSupabase() {
  showStatus('⏳ 載入資料中…');
  try {
    const res = await fetch(`${SB_URL}/rest/v1/scorecard?id=eq.main&select=data`, { headers: SB_HDR });
    const rows = await res.json();
    if (rows && rows.length > 0 && rows[0].data && Object.keys(rows[0].data).length > 0) {
      const d = rows[0].data;
      if (d.perspectives) S.perspectives = d.perspectives;
      if (d.staff)        S.staff        = d.staff;
      if (d.goals)        S.goals        = d.goals;
      if (d.checks)       S.checks       = d.checks;
      if (d.nextId)       S.nextId       = d.nextId;
      showStatus('');
    } else {
      // 第一次使用，先把預設資料存進去
      showStatus('');
      await saveToSupabase();
    }
  } catch(e) {
    showStatus('⚠️ 載入失敗，使用本機暫存');
    loadLocal();
  }
  render();
}

// ── 儲存資料（防抖 1.5 秒）──
function saveState() {
  saveLocal();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveToSupabase, 1500);
}

async function saveToSupabase() {
  const payload = { perspectives: S.perspectives, staff: S.staff, goals: S.goals, checks: S.checks, nextId: S.nextId };
  try {
    showStatus('💾 儲存中…');
    const res = await fetch(`${SB_URL}/rest/v1/scorecard?id=eq.main`, {
      method: 'PATCH',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ data: payload, updated_at: new Date().toISOString() }),
    });
    if (res.ok) {
      showStatus('✅ 已儲存');
      setTimeout(() => showStatus(''), 2000);
    } else {
      const err = await res.text();
      console.error('Supabase save error:', err);
      showStatus('⚠️ 儲存失敗');
    }
  } catch(e) {
    showStatus('⚠️ 網路錯誤，已存本機');
  }
}

}
